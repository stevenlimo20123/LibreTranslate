# Ensure Nixpacks has all files required to build the local Python package
# during the install phase. The Python provider normally copies only
# pyproject.toml for dependency-layer caching, but hatchling reads VERSION
# and package files while running `pip install .`.
[phases.install]
onlyIncludeFiles = [
  "...",
  "VERSION",
  "README.md",
  "LICENSE",
  "babel.cfg",
  "main.py",
  "manage.py",
  "wsgi.py",
  "libretranslate/**",
  "scripts/**",
]
